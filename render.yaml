databases:
  - name: orbe-postgres
    databaseName: orbe
    user: orbe
    plan: free
services:
  - type: web
    name: orbe-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: orbe-postgres, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://comandarestaurantes.onrender.com
  - type: web
    name: orbe-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://comanda-lp2b.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://comanda-lp2b.onrender.com
      - key: VITE_RESTAURANT_SLUG
        value: seu-restaurante
