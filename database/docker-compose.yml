services:
  postgres:
    image: postgres:16-alpine
    container_name: orbe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orbe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["orbe_postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orbe"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  orbe_postgres_data:
